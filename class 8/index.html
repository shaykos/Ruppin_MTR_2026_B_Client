<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./styles/style.css">
    <script type="module" src="./scripts/main.js"></script>
</head>

<body>
    <div class="Registration">
        <section class="container">
            <h2> REGISTER HERE..</h2>
            <form id="registration">
                <img class="avatar" src="https://cdn-icons-png.flaticon.com/512/6858/6858504.png" alt="avatar image">

                <div class="form-input">
                    <label>Full Name:</label>
                    <input type="text" id="full_name" name="user name" placeholder="Name.." required>
                </div>

                <div class="form-input">
                    <label>Email:</label>
                    <input type="email" id="email" name="email address" placeholder="Email Address.." required>
                </div>

                <div class="form-input">
                    <label>Date of Birth:</label>
                    <input type="date" name="DOB" id="dob" required>
                </div>

                <div class="form-input">
                    <label>Country: </label>
                    <select name="country" id="country" required>
                        <option value="select" disabled selected>--Select Country--</option>
                        <option value="India">INDIA</option>
                        <option value="USA">USA</option>
                        <option value="Canada">CANDA</option>
                        <option value="UK">UK</option>
                        <option value="ENGLAND">ENGLAND</option>
                    </select>
                </div>
                <div class="form-input">
                    <label>Phone Number:</label>
                    <input type="tel" name="Phone Number" id="phone" placeholder="Enter Phone Number..">
                </div>

                <div class="form-input">
                    <label>Password: </label>
                    <input type="password" id="password" name="user password" placeholder="Password" required>
                </div>

                <div class="form-input">
                    <label>Confirm Password: </label>
                    <input type="password" id="confirm_password" name="confirm user password" placeholder="Confirm Password" required>
                </div>

                <div class="form-input">
                    <div class="terms">
                        <input type="checkbox" required id="terms">
                        <label for="terms"> I agree to Terms & Conditions</label>
                    </div>
                    <input type="submit" value="REGISTER">
                </div>
            </form>
        </section>
</body>

</html>
